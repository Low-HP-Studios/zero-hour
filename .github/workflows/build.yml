name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm run build:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate mac artifacts
        run: |
          node -e "const fs=require('fs');const files=fs.readdirSync('release');const hasDmg=files.some((f)=>f.endsWith('.dmg'));const hasYml=files.includes('latest-mac.yml');const hasBlockmap=files.some((f)=>f.endsWith('.blockmap'));if(!hasDmg||!hasYml||!hasBlockmap){console.error('Missing expected mac artifacts',files);process.exit(1);}console.log('mac artifacts OK:',files);"

      - uses: actions/upload-artifact@v4
        with:
          name: mac-build
          path: |
            release/*.dmg
            release/latest*.yml
            release/*.blockmap
          if-no-files-found: error

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate windows artifacts
        shell: bash
        run: |
          node -e "const fs=require('fs');const files=fs.readdirSync('release');const hasExe=files.some((f)=>f.endsWith('.exe'));const hasYml=files.includes('latest.yml');const hasBlockmap=files.some((f)=>f.endsWith('.blockmap'));if(!hasExe||!hasYml||!hasBlockmap){console.error('Missing expected windows artifacts',files);process.exit(1);}console.log('windows artifacts OK:',files);"

      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            release/*.exe
            release/latest*.yml
            release/*.blockmap
          if-no-files-found: error

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm run build:linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate linux artifacts
        run: |
          node -e "const fs=require('fs');const files=fs.readdirSync('release');const hasAppImage=files.some((f)=>f.endsWith('.AppImage'));const hasYml=files.some((f)=>f.startsWith('latest')&&f.endsWith('.yml'));if(!hasAppImage||!hasYml){console.error('Missing expected linux artifacts',files);process.exit(1);}console.log('linux artifacts OK:',files);"

      - uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: |
            release/*.AppImage
            release/latest*.yml
            release/*.blockmap
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-mac, build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          draft: false
          generate_release_notes: true
